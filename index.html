<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>足し算スイカゲーム</title>
<style>
  body{
    margin:0;
    font-family:"Arial","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:#f7f7f7;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px;
    box-sizing:border-box;
  }
  h1{
    margin:0 0 8px 0;
    font-size:28px;
  }
  .info{
    display:flex;
    gap:16px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:10px;
    font-size:18px;
  }
  button{
    font-size:16px;
    padding:8px 14px;
    border:none;
    border-radius:10px;
    background:#4caf50;
    color:#fff;
    cursor:pointer;
  }
  button:hover{
    opacity:0.9;
  }
  #gameWrap{
    position:relative;
    width:min(92vw, 420px);
  }
  canvas{
    width:100%;
    height:auto;
    display:block;
    background:linear-gradient(to bottom,#fffef8,#fff4d6);
    border:3px solid #666;
    border-radius:16px;
    touch-action:none;
  }
  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:bold;
    color:#fff;
    background:rgba(0,0,0,0.45);
    border-radius:16px;
    visibility:hidden;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
  }
  .note{
    margin-top:10px;
    font-size:15px;
    color:#333;
    line-height:1.6;
    text-align:center;
  }
</style>
</head>
<body>
  <h1>足し算スイカゲーム</h1>

  <div class="info">
    <div>スコア: <span id="score">0</span></div>
    <div>次: <span id="nextNum">1</span></div>
    <button id="restartBtn">もう一回</button>
  </div>

  <div id="gameWrap">
    <canvas id="game" width="420" height="620"></canvas>
    <div id="overlay">ゲームオーバー</div>
  </div>

  <div class="note">
    画面をタップ・クリックした位置に数字を落とします。<br>
    数字同士がぶつかると足し算され、<b>10になったら消えます</b>。<br>
    <b>赤いラインを超えるとゲームオーバー</b>です。
  </div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const nextNumEl = document.getElementById("nextNum");
  const overlay = document.getElementById("overlay");
  const restartBtn = document.getElementById("restartBtn");

  const W = canvas.width;
  const H = canvas.height;
  const WALL = 8;
  const RADIUS = 24;
  const DROP_Y = 48;
  const GAMEOVER_LINE = 120;
  const GRAVITY = 0.28;
  const AIR = 0.999;
  const BOUNCE = 0.18;
  const MERGE_SPEED_DAMP = 0.35;

  let score = 0;
  let gameOver = false;
  let nextValue = randValue();
  let balls = [];
  let pointerX = W / 2;
  let canDrop = true;

  function randValue() {
    // 1～4を出す
    return 1 + Math.floor(Math.random() * 4);
  }

  function colorForValue(v){
    const map = {
      1:"#ffd54f",
      2:"#ffb74d",
      3:"#ff8a65",
      4:"#81c784",
      5:"#4db6ac",
      6:"#64b5f6",
      7:"#9575cd",
      8:"#f06292",
      9:"#90a4ae"
    };
    return map[v] || "#cccccc";
  }

  function newBall(x, y, value){
    return {
      x, y,
      vx: 0,
      vy: 0,
      r: RADIUS,
      value,
      remove:false
    };
  }

  function resetGame(){
    score = 0;
    gameOver = false;
    balls = [];
    nextValue = randValue();
    pointerX = W / 2;
    canDrop = true;
    overlay.style.visibility = "hidden";
    updateUI();
  }

  function updateUI(){
    scoreEl.textContent = score;
    nextNumEl.textContent = nextValue;
  }

  function clamp(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function dropBall(x){
    if(gameOver || !canDrop) return;

    x = clamp(x, WALL + RADIUS, W - WALL - RADIUS);
    balls.push(newBall(x, DROP_Y, nextValue));
    nextValue = randValue();
    updateUI();

    canDrop = false;
    setTimeout(() => {
      if (!gameOver) canDrop = true;
    }, 220);
  }

  function triggerGameOver(){
    gameOver = true;
    overlay.style.visibility = "visible";
  }

  function physics(){
    // 重力
    for(const b of balls){
      b.vy += GRAVITY;
      b.vx *= AIR;
      b.vy *= AIR;
      b.x += b.vx;
      b.y += b.vy;

      // 左右壁
      if(b.x - b.r < WALL){
        b.x = WALL + b.r;
        b.vx *= -BOUNCE;
      }
      if(b.x + b.r > W - WALL){
        b.x = W - WALL - b.r;
        b.vx *= -BOUNCE;
      }

      // 床
      if(b.y + b.r > H - WALL){
        b.y = H - WALL - b.r;
        b.vy *= -BOUNCE;
        b.vx *= 0.96;
        if(Math.abs(b.vy) < 0.5) b.vy = 0;
      }
    }

    // 衝突判定と押し戻し・合体
    for(let i = 0; i < balls.length; i++){
      for(let j = i + 1; j < balls.length; j++){
        const a = balls[i];
        const b = balls[j];
        if(a.remove || b.remove) continue;

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minDist = a.r + b.r;

        if(dist < minDist){
          // めり込み補正
          const nx = dist === 0 ? 1 : dx / dist;
          const ny = dist === 0 ? 0 : dy / dist;
          const overlap = minDist - dist;

          a.x -= nx * overlap * 0.5;
          a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5;
          b.y += ny * overlap * 0.5;

          // 速度を少し散らす
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const sep = rvx * nx + rvy * ny;
          if(sep < 0){
            const impulse = -sep * 0.18;
            a.vx -= impulse * nx;
            a.vy -= impulse * ny;
            b.vx += impulse * nx;
            b.vy += impulse * ny;
          }

          // 足し算合体
          // 条件: ある程度ゆっくりぶつかったとき
          const speed = Math.hypot(a.vx - b.vx, a.vy - b.vy);
          if(speed < 3.2){
            mergeBalls(a, b);
          }
        }
      }
    }

    balls = balls.filter(b => !b.remove);

    // ゲームオーバー判定
    // 十分静止している球がライン上にあったらアウト
    for(const b of balls){
      const almostStill = Math.abs(b.vx) < 0.8 && Math.abs(b.vy) < 0.8;
      if(almostStill && (b.y - b.r < GAMEOVER_LINE)){
        triggerGameOver();
        break;
      }
    }
  }

  function mergeBalls(a, b){
    if(a.remove || b.remove) return;

    const newValue = a.value + b.value;
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const mvx = (a.vx + b.vx) * MERGE_SPEED_DAMP;
    const mvy = (a.vy + b.vy) * MERGE_SPEED_DAMP;

    a.remove = true;
    b.remove = true;

    if(newValue === 10){
      score += 10;
      updateUI();
      return;
    }

    // 10を超える場合は9に丸める
    const created = newBall(mx, my, Math.min(newValue, 9));
    created.vx = mvx;
    created.vy = mvy;
    balls.push(created);

    score += newValue;
    updateUI();
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);

    // ゲームオーバーライン
    ctx.save();
    ctx.strokeStyle = "#e53935";
    ctx.lineWidth = 4;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(0, GAMEOVER_LINE);
    ctx.lineTo(W, GAMEOVER_LINE);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#e53935";
    ctx.font = "bold 16px sans-serif";
    ctx.fillText("ラインを超えるとゲームオーバー", 12, GAMEOVER_LINE - 8);
    ctx.restore();

    // 投下位置ガイド
    if(!gameOver){
      ctx.save();
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pointerX, 0);
      ctx.lineTo(pointerX, DROP_Y);
      ctx.stroke();

      ctx.beginPath();
      ctx.fillStyle = colorForValue(nextValue);
      ctx.arc(pointerX, DROP_Y, RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#555";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#222";
      ctx.font = "bold 24px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(nextValue, pointerX, DROP_Y);
      ctx.restore();
    }

    // ボール
    for(const b of balls){
      ctx.beginPath();
      ctx.fillStyle = colorForValue(b.value);
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "#555";
      ctx.stroke();

      ctx.fillStyle = "#222";
      ctx.font = "bold 24px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(b.value, b.x, b.y);
    }
  }

  function loop(){
    if(!gameOver){
      physics();
    }
    draw();
    requestAnimationFrame(loop);
  }

  function getPointerX(ev){
    const rect = canvas.getBoundingClientRect();
    const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    return (clientX - rect.left) * (canvas.width / rect.width);
  }

  canvas.addEventListener("mousemove", (e) => {
    pointerX = clamp(getPointerX(e), WALL + RADIUS, W - WALL - RADIUS);
  });

  canvas.addEventListener("click", (e) => {
    pointerX = clamp(getPointerX(e), WALL + RADIUS, W - WALL - RADIUS);
    dropBall(pointerX);
  });

  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    pointerX = clamp(getPointerX(e), WALL + RADIUS, W - WALL - RADIUS);
    dropBall(pointerX);
  }, { passive:false });

  canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    pointerX = clamp(getPointerX(e), WALL + RADIUS, W - WALL - RADIUS);
  }, { passive:false });

  restartBtn.addEventListener("click", resetGame);

  resetGame();
  loop();
})();
</script>
</body>
</html>
