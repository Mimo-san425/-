<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>足し算スイカゲーム</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f7f7f7;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px;
}

h1{ margin:0 0 10px; }

canvas{
  background:linear-gradient(#fffef8,#fff4d6);
  border:3px solid #666;
  border-radius:16px;
  touch-action:none;
}
</style>
</head>

<body>

<h1>足し算スイカゲーム</h1>

<div>スコア: <span id="score">0</span></div>
<div>次: <span id="next">1</span></div>
<button onclick="reset()">もう一回</button>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const LINE = 120;

let balls = [];
let score = 0;
let next = rand();
let gameOver = false;
let dropCooldown = 0;
let pointerX = W/2;

// ===== 色テーブル =====
function getColor(v){
  const colors = {
    1:"#ffd54f",
    2:"#ffb74d",
    3:"#ff8a65",
    4:"#81c784",
    5:"#4db6ac",
    6:"#64b5f6",
    7:"#9575cd",
    8:"#f06292",
    9:"#90a4ae"
  };
  return colors[v] || "#ccc";
}

// サイズ
function getRadius(value){
  return 16 + value * 4;
}

function rand(){
  return 1 + Math.floor(Math.random()*4);
}

function reset(){
  balls = [];
  score = 0;
  next = rand();
  gameOver = false;
  dropCooldown = 0;
}

function addBall(x){
  if(gameOver) return;

  const r = getRadius(next);

  balls.push({
    x: Math.max(r, Math.min(W - r, x)),
    y: 50,
    vx: 0,
    vy: 0,
    value: next,
    r: r
  });

  next = rand();
  dropCooldown = 20;
}

// マウス位置追跡
canvas.addEventListener("mousemove", (e)=>{
  const rect = canvas.getBoundingClientRect();
  pointerX = (e.clientX - rect.left) * (W / rect.width);
});

// クリック
canvas.addEventListener("click", (e)=>{
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  addBall(x);
});

// タッチ
canvas.addEventListener("touchstart", (e)=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches[0].clientX - rect.left) * (W / rect.width);
  addBall(x);
},{passive:false});

function update(){

  for(const b of balls){
    b.vy += 0.3;
    b.x += b.vx;
    b.y += b.vy;

    if(b.x - b.r < 0){
      b.x = b.r;
      b.vx *= -0.5;
    }
    if(b.x + b.r > W){
      b.x = W - b.r;
      b.vx *= -0.5;
    }

    if(b.y + b.r > H){
      b.y = H - b.r;
      b.vy *= -0.2;
      if(Math.abs(b.vy) < 0.5) b.vy = 0;
    }
  }

  // 衝突
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      const a = balls[i];
      const b = balls[j];

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = a.r + b.r;

      if(dist < minDist){

        const nx = dx / dist || 1;
        const ny = dy / dist || 0;
        const overlap = minDist - dist;

        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;

        const sum = a.value + b.value;

        if(sum > 10){
          a.vy *= -0.3;
          b.vy *= -0.3;
          continue;
        }

        if(Math.abs(a.vy - b.vy) < 3){

          balls.splice(j,1);
          balls.splice(i,1);

          if(sum === 10){
            score += 10;
          }else{
            const r = getRadius(sum);

            balls.push({
              x:(a.x+b.x)/2,
              y:(a.y+b.y)/2,
              vx:0,
              vy:0,
              value:sum,
              r:r
            });

            score += sum;
          }

          return;
        }
      }
    }
  }

  if(dropCooldown > 0){
    dropCooldown--;
  }else{
    for(const b of balls){
      if(Math.abs(b.vy) < 0.5 && b.y - b.r < LINE){
        gameOver = true;
      }
    }
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // ===== ライン =====
  ctx.strokeStyle="red";
  ctx.setLineDash([8,6]);
  ctx.beginPath();
  ctx.moveTo(0,LINE);
  ctx.lineTo(W,LINE);
  ctx.stroke();
  ctx.setLineDash([]);

  // ===== 次のボール表示 =====
  const r = getRadius(next);

  ctx.beginPath();
  ctx.arc(pointerX, 50, r, 0, Math.PI*2);
  ctx.fillStyle = getColor(next);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle="#000";
  ctx.font=(r*0.9)+"px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(next, pointerX, 50);

  // ガイド線
  ctx.strokeStyle="rgba(0,0,0,0.2)";
  ctx.beginPath();
  ctx.moveTo(pointerX,0);
  ctx.lineTo(pointerX,100);
  ctx.stroke();

  // ===== ボール =====
  for(const b of balls){
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=getColor(b.value);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle="#000";
    ctx.font=(b.r*0.9)+"px sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(b.value,b.x,b.y);
  }

  document.getElementById("score").textContent = score;
  document.getElementById("next").textContent = next;

  if(gameOver){
    ctx.fillStyle="rgba(0,0,0,0.5)";
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#fff";
    ctx.font="40px sans-serif";
    ctx.textAlign="center";
    ctx.fillText("GAME OVER",W/2,H/2);
  }
}

function loop(){
  if(!gameOver) update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
