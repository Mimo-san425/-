<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10を作るパズルゲーム</title>

<style>
body {
    font-family: 'Comic Sans MS', cursive, sans-serif;
    text-align: center;
    padding: 10px;
    background-color: #ffffe0;
}

.board {
    display: grid;
    gap: 8px;
    justify-content: center;
    margin: 20px auto;
    padding: 10px;
    background-color: #ffffff;
    border-radius: 20px;
}

/* ⭐サイズ可変に変更 */
.cell {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: calc(var(--cell-size) / 3);
    cursor: pointer;
    border-radius: 10px;
    border: 2px solid #333;
    transition: 0.2s;
}

.cell.selected {
    background-color: #ffeb3b;
    transform: scale(1.1);
}

.cell.hidden {
    visibility: hidden;
}

.message {
    font-size: 28px;
    font-weight: bold;
    color: #ff4081;
    white-space: pre-line;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>10を作るパズルゲーム</h1>

<button onclick="startGame(2)">簡単</button>
<button onclick="startGame(4)">ふつう</button>
<button onclick="startGame(8)">むずかしい</button>

<div id="board" class="board"></div>

<p>選んだ数字: <span id="selected">なし</span></p>
<p>タイム: <span id="timer">0</span>秒</p>

<div id="message" class="message"></div>

<button onclick="startNewGame()">もう一回</button>

<script>
let boardSize = 4;
let selected = [];
let selectedCells = [];
let time = 0;
let timer;

// 数字生成
function generate() {
    const pairs = [[1,9],[2,8],[3,7],[4,6],[5,5]];
    let nums = [];
    let count = (boardSize * boardSize) / 2;

    for (let i = 0; i < count; i++) {
        let p = pairs[i % pairs.length];
        nums.push(p[0], p[1]);
    }

    return nums.sort(() => Math.random() - 0.5);
}

// 色
function color(n) {
    const colors = ["","#ff6666","#ffcc66","#66ff66","#66ccff","#ff66cc","#cc66ff","#ff9966","#66ffcc","#ffccff"];
    return colors[n];
}

// ボード生成
function create() {
    const board = document.getElementById("board");
    board.innerHTML = "";

    // ⭐画面に合わせてサイズ調整（ここがポイント）
    let cellSize = Math.min(90, window.innerWidth / (boardSize + 1));
    board.style.setProperty('--cell-size', cellSize + "px");

    board.style.gridTemplateColumns = `repeat(${boardSize}, var(--cell-size))`;

    let nums = generate();

    nums.forEach(n => {
        let cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = n;
        cell.style.background = color(n);

        cell.onclick = () => clickCell(n, cell);

        board.appendChild(cell);
    });

    selected = [];
    selectedCells = [];
    document.getElementById("selected").textContent = "なし";
    document.getElementById("message").textContent = "";
}

// クリック処理
function clickCell(n, cell) {
    if (cell.classList.contains("hidden")) return;

    if (selected.length === 2) reset();

    selected.push(n);
    selectedCells.push(cell);

    cell.classList.add("selected");
    document.getElementById("selected").textContent = selected.join(" + ");

    if (selected.length === 2) {
        let sum = selected[0] + selected[1];

        if (sum === 10) {
            selectedCells.forEach(c => c.classList.add("hidden"));
            document.getElementById("message").textContent = "いいね！";

            if (document.querySelectorAll(".hidden").length === boardSize * boardSize) {
                clearInterval(timer);
                document.getElementById("message").textContent =
                    "おめでとう！\nすべての数字を消しました！";
            }

        } else {
            document.getElementById("message").textContent = "おしい！";
            reset();
        }
    }
}

// リセット
function reset() {
    selected = [];
    selectedCells = [];
    document.getElementById("selected").textContent = "なし";
    document.querySelectorAll(".cell").forEach(c => c.classList.remove("selected"));
}

// タイマー
function startTimer() {
    clearInterval(timer);
    time = 0;
    timer = setInterval(() => {
        time++;
        document.getElementById("timer").textContent = time;
    }, 1000);
}

// ゲーム開始
function startGame(size) {
    boardSize = size;
    create();
    startTimer();
}

// 再スタート
function startNewGame() {
    create();
    startTimer();
}
</script>

</body>
</html>
